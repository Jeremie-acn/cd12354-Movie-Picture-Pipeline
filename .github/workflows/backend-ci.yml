name: Backend CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:

  lint-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run lint
        run: |
          cd starter/backend
          flake8 .


  test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          cd starter/backend
          pip install pytest flask flask-cors

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: |
          cd starter/backend
          pytest


  build-backend:
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd starter/backend
          docker build -t mp-backend:latest .