name: Backend CI

on:
  pull_request:
  workflow_dispatch:

jobs:

  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install Python dependencies including dev packages
        run: pipenv install --dev

      - name: Run linter
        run: pipenv run lint

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install Python dependencies
        run: pipenv install

      - name: Run tests
        run: pipenv run test

  build-backend:
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend]
    defaults:
      run:
        working-directory: starter/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies for uwsgi
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc python3-dev libffi-dev libpcre3-dev build-essential

      - name: Build Docker image
        run: docker build -t mp-backend:latest .